<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Printer</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;600;700&display=swap');

:root {
  --bg: #f5f4f0;
  --surface: #ffffff;
  --border: #dddbd5;
  --ink: #1a1917;
  --muted: #888580;
  --accent: #1a1917;
  --green: #2d7a4f;
  --red: #b93030;
  --yellow: #c97b00;
  --paper: #faf9f6;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--ink);
  font-family: 'IBM Plex Sans', sans-serif;
  min-height: 100vh;
  padding: 32px 16px 64px;
}

.wrap { max-width: 600px; margin: 0 auto; }

.hdr {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 28px;
  padding-bottom: 16px;
  border-bottom: 2px solid var(--ink);
}
.hdr-title {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 1.4rem;
  font-weight: 600;
  letter-spacing: -0.02em;
}
.hdr-sub {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 0.7rem;
  color: var(--muted);
  letter-spacing: 0.08em;
  text-transform: uppercase;
}

.badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 0.7rem;
  padding: 4px 10px;
  border-radius: 99px;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--muted);
}
.badge.ok { border-color: var(--green); color: var(--green); }
.badge.err { border-color: var(--red); color: var(--red); }
.badge.scanning { border-color: var(--yellow); color: var(--yellow); }

.dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: currentColor;
}
.dot.pulse { animation: blink 1s infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

.section {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 20px;
  margin-bottom: 14px;
}
.section-label {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 0.65rem;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 14px;
}

.device-list { display: flex; flex-direction: column; gap: 8px; }
.device-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 14px;
  border: 1px solid var(--border);
  border-radius: 8px;
  background: var(--paper);
  cursor: pointer;
  transition: border-color 0.15s, background 0.15s;
}
.device-item:hover { border-color: var(--ink); background: #fff; }
.device-item.selected { border-color: var(--ink); background: var(--ink); color: #fff; }
.device-item.selected .dev-sub { color: #aaa; }

.dev-main { font-weight: 600; font-size: 0.9rem; }
.dev-sub {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 0.7rem;
  color: var(--muted);
  margin-top: 2px;
}
.dev-right { text-align: right; }
.dev-ip {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 0.75rem;
}
.dev-rssi { font-size: 0.65rem; color: var(--muted); margin-top: 2px; }

.scan-footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-top: 12px;
}
.scan-note {
  font-size: 0.75rem;
  color: var(--muted);
  font-family: 'IBM Plex Mono', monospace;
}

button {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 0.8rem;
  font-weight: 500;
  padding: 8px 16px;
  border-radius: 6px;
  border: 1px solid var(--ink);
  background: var(--ink);
  color: #fff;
  cursor: pointer;
  transition: opacity 0.15s;
  letter-spacing: 0.02em;
}
button:hover { opacity: 0.8; }
button:active { opacity: 0.6; }
button:disabled { opacity: 0.3; cursor: not-allowed; }
button.ghost {
  background: transparent;
  color: var(--ink);
}
button.sm { padding: 6px 12px; font-size: 0.72rem; }

.manual-row {
  display: flex; gap: 8px; margin-top: 12px;
}
input[type="text"] {
  flex: 1;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 0.85rem;
  padding: 8px 12px;
  border: 1px solid var(--border);
  border-radius: 6px;
  background: var(--paper);
  color: var(--ink);
  outline: none;
  transition: border-color 0.15s;
}
input[type="text"]:focus { border-color: var(--ink); }

.dropzone {
  border: 2px dashed var(--border);
  border-radius: 8px;
  padding: 32px 20px;
  text-align: center;
  cursor: pointer;
  position: relative;
  transition: border-color 0.2s, background 0.2s;
}
.dropzone:hover, .dropzone.over { border-color: var(--ink); background: var(--paper); }
.dropzone input { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
.dropzone-icon { font-size: 1.8rem; margin-bottom: 8px; }
.dropzone p { font-size: 0.82rem; color: var(--muted); }
.dropzone strong { color: var(--ink); }

.page-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
  gap: 8px;
  margin-top: 12px;
}
.page-thumb {
  border: 2px solid var(--border);
  border-radius: 6px;
  overflow: hidden;
  cursor: pointer;
  position: relative;
  transition: border-color 0.15s;
  background: #fff;
}
.page-thumb canvas { display: block; width: 100%; }
.page-thumb .pnum {
  position: absolute; bottom: 4px; right: 5px;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 0.6rem;
  color: var(--muted);
  background: rgba(255,255,255,0.8);
  padding: 1px 4px;
  border-radius: 3px;
}
.page-thumb:hover { border-color: var(--muted); }
.page-thumb.sel { border-color: var(--ink); }
.page-thumb.sel::after {
  content: '✓';
  position: absolute; top: 4px; right: 5px;
  font-size: 0.65rem;
  background: var(--ink);
  color: #fff;
  width: 16px; height: 16px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  line-height: 16px;
  text-align: center;
}

.slider-row { display: flex; align-items: center; gap: 10px; margin-top: 10px; }
input[type="range"] { flex: 1; accent-color: var(--ink); }
.slider-labels { display: flex; justify-content: space-between; }
.slider-labels span { font-size: 0.65rem; color: var(--muted); font-family: 'IBM Plex Mono', monospace; }

#print-btn {
  width: 100%;
  padding: 14px;
  font-size: 0.95rem;
  border-radius: 8px;
  margin-top: 6px;
  letter-spacing: 0.04em;
}

#log {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 0.72rem;
  line-height: 1.9;
  color: var(--muted);
  max-height: 120px;
  overflow-y: auto;
}
#log .ok { color: var(--green); }
#log .err { color: var(--red); }
#log .info { color: var(--yellow); }

details summary {
  cursor: pointer;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 0.7rem;
  color: var(--muted);
  letter-spacing: 0.08em;
  text-transform: uppercase;
  margin-top: 12px;
  user-select: none;
}
</style>
</head>
<body>
<div class="wrap">

  <div class="hdr">
    <div>
      <div class="hdr-title">🖨 Printer</div>
      <div class="hdr-sub">ESP32 Bridge</div>
    </div>
    <div class="badge" id="conn-badge">
      <span class="dot"></span>
      <span id="badge-text">Not connected</span>
    </div>
  </div>

  <div class="section">
    <div class="section-label">01 — Find ESP32 on network</div>
    <p style="font-size:0.82rem;color:var(--muted);margin-bottom:12px">
      Press scan to search your local network for ESP32 devices.
    </p>
    <div class="device-list" id="device-list"></div>
    <div class="scan-footer">
      <span class="scan-note" id="scan-note">—</span>
      <button class="sm" onclick="startScan()">⟳ Scan</button>
    </div>
    <details>
      <summary>Enter IP manually</summary>
      <div class="manual-row">
        <input type="text" id="manual-ip" placeholder="192.168.1.42">
        <button class="sm ghost" onclick="connectManual()">Connect</button>
      </div>
    </details>
  </div>

  <div class="section" id="upload-section" style="display:none">
    <div class="section-label">02 — Upload PDF or image</div>
    <div class="dropzone" id="dropzone">
      <input type="file" id="file-input" accept=".pdf,.png,.jpg,.jpeg,image/*,application/pdf">
      <div class="dropzone-icon">📄</div>
      <p>Drop file here<br><strong>PDF, PNG or JPG</strong></p>
    </div>
  </div>

  <div class="section" id="print-section" style="display:none">
    <div class="section-label">03 — Select pages &amp; print</div>
    <div class="page-grid" id="page-grid"></div>
    <div class="slider-row">
      <span style="font-size:0.75rem;color:var(--muted)">Darkness</span>
      <input type="range" id="darkness" min="1" max="100" value="70">
      <span id="darkness-val" style="font-family:'IBM Plex Mono',monospace;font-size:0.75rem;width:28px">70</span>
    </div>
    <div class="slider-labels"><span>light</span><span>dark</span></div>
    <button id="print-btn" onclick="printSelected()" disabled>Print selected pages</button>
  </div>

  <div class="section">
    <div class="section-label">Log</div>
    <div id="log"><div>Ready.</div></div>
  </div>

</div>

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc =
  'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

let espURL = '';
let connected = false;
let pages = [];
let pollTimer = null;
let scanAbort = null;
const foundIds = new Set();

function log(msg, cls='') {
  const el = document.getElementById('log');
  const d = document.createElement('div');
  if (cls) d.className = cls;
  d.textContent = new Date().toLocaleTimeString('en-US',{hour12:false}) + ' ' + msg;
  el.appendChild(d);
  el.scrollTop = el.scrollHeight;
  while (el.children.length > 60) el.removeChild(el.firstChild);
}

function setBadge(state, text) {
  const b = document.getElementById('conn-badge');
  const d = b.querySelector('.dot');
  b.className = 'badge ' + state;
  d.className = 'dot' + (state === 'scanning' ? ' pulse' : '');
  document.getElementById('badge-text').textContent = text;
}

function fetchWithTimeout(url, ms, externalSignal) {
  const ctrl = new AbortController();
  const timer = setTimeout(() => ctrl.abort(), ms);
  const onAbort = () => ctrl.abort();
  if (externalSignal) {
    if (externalSignal.aborted) ctrl.abort();
    else externalSignal.addEventListener('abort', onAbort, { once: true });
  }
  return fetch(url, { signal: ctrl.signal, mode: 'cors' })
    .finally(() => {
      clearTimeout(timer);
      if (externalSignal) externalSignal.removeEventListener('abort', onAbort);
    });
}

async function detectLocalSubnet() {
  if (!window.RTCPeerConnection) return null;
  return new Promise((resolve) => {
    let done = false;
    const finish = (subnet) => {
      if (done) return;
      done = true;
      try { pc.close(); } catch {}
      resolve(subnet);
    };
    const pc = new RTCPeerConnection({ iceServers: [] });
    pc.createDataChannel('x');
    pc.onicecandidate = (e) => {
      if (!e.candidate || !e.candidate.candidate) return;
      const m = e.candidate.candidate.match(/\b((?:192|10|172)\.\d+\.\d+\.\d+)\b/);
      if (!m) return;
      const ip = m[1];
      if (ip.startsWith('127.') || ip.startsWith('0.')) return;
      const parts = ip.split('.');
      finish(`${parts[0]}.${parts[1]}.${parts[2]}`);
    };
    pc.createOffer().then(o => pc.setLocalDescription(o)).catch(() => finish(null));
    setTimeout(() => finish(null), 2500);
  });
}

function buildSubnetList(detected) {
  const defaults = [
    '192.168.1', '192.168.0', '192.168.2', '192.168.4', '192.168.10',
    '10.0.0', '10.0.1', '172.16.0', '172.16.1'
  ];
  const out = [];
  if (detected) out.push(detected);
  for (const s of defaults) {
    if (!out.includes(s)) out.push(s);
  }
  return out;
}

function deviceLabel(info) {
  if (info.board) return info.board;
  if (info.name) return info.name;
  if (info.hostname) return info.hostname;
  if (info.device) return info.device;
  return 'ESP32';
}

function isEsp32Device(j) {
  if (!j || typeof j !== 'object') return false;
  const blob = JSON.stringify(j).toLowerCase();
  if (/esp32|nodemcu|node-mcu|32-32e|wroom|wrover|esp-32/.test(blob)) return true;
  if (j.device === 'ESP32-PrintBridge') return true;
  if (j.printer !== undefined && j.ip !== undefined) return true;
  return false;
}

async function probeUrl(url, signal) {
  try {
    const r = await fetchWithTimeout(url, 900, signal);
    if (!r.ok) return null;
    const ct = (r.headers.get('content-type') || '').toLowerCase();
    if (!ct.includes('json') && !ct.includes('text')) return null;
    const j = await r.json();
    return isEsp32Device(j) ? j : null;
  } catch {}
  return null;
}

async function probeStatus(ipOrHost, signal) {
  const bases = [`http://${ipOrHost}`];
  const paths = ['/status', '/api/status', '/info'];
  for (const base of bases) {
    for (const path of paths) {
      const j = await probeUrl(base + path, signal);
      if (j) return j;
    }
  }
  return null;
}

function deviceKey(info, ip) {
  return (info.mac || ip) + '|' + deviceLabel(info);
}

function deviceSubline(info) {
  const parts = [];
  if (info.device && info.device !== info.board) parts.push(info.device);
  if (info.printerName) parts.push('printer: ' + info.printerName);
  if (info.printer) parts.push(info.printer);
  if (info.firmware) parts.push('fw ' + info.firmware);
  return parts.length ? parts.join(' · ') : 'ESP32 on local network';
}

function addDeviceToList(info, ip) {
  const key = deviceKey(info, ip);
  if (foundIds.has(key)) return;
  foundIds.add(key);

  const item = document.createElement('div');
  item.className = 'device-item';
  const label = deviceLabel(info);
  item.innerHTML = `
    <div>
      <div class="dev-main">${label}</div>
      <div class="dev-sub">${deviceSubline(info)}</div>
    </div>
    <div class="dev-right">
      <div class="dev-ip">${ip}</div>
      <div class="dev-rssi">${info.rssi != null ? 'WiFi ' + info.rssi + ' dBm' : ''}</div>
    </div>`;
  item.addEventListener('click', () => connectTo(ip, item));
  document.getElementById('device-list').appendChild(item);
}

async function startScan() {
  if (scanAbort) scanAbort.abort();
  scanAbort = new AbortController();
  const signal = scanAbort.signal;

  const list = document.getElementById('device-list');
  list.innerHTML = '';
  foundIds.clear();
  document.getElementById('scan-note').textContent = 'Scanning…';
  setBadge('scanning', 'Scanning');
  log('Scanning for ESP32 devices (NodeMCU, PrintBridge, etc.)…', 'info');

  const found = [];
  let probed = 0;

  // Try mDNS names first (works on some networks without IP scan)
  const mdnsHosts = ['esp32-printbridge.local', 'esp32-printbridge'];
  for (const host of mdnsHosts) {
    if (signal.aborted) break;
    const j = await probeStatus(host, signal);
    if (j) {
      addDeviceToList(j, j.ip || host);
      found.push(j.ip || host);
      log(`Found: ${deviceLabel(j)} at ${j.ip || host} (printer: ${j.printer})`, 'ok');
    }
  }

  const detected = await detectLocalSubnet();
  if (detected) log('Detected subnet ' + detected + '.x', 'info');

  const subnets = buildSubnetList(detected);
  const total = subnets.length * 254;

  const probe = async (ip) => {
    if (signal.aborted) return;
    const j = await probeStatus(ip, signal);
    if (j) {
      const useIp = j.ip || ip;
      if (!found.includes(useIp)) {
        addDeviceToList(j, useIp);
        found.push(useIp);
        log(`Found: ${deviceLabel(j)} at ${useIp} (printer: ${j.printer})`, 'ok');
      }
    }
    probed++;
    if (!signal.aborted) {
      document.getElementById('scan-note').textContent =
        `Probed ${probed}/${total}${found.length ? ' · ' + found.length + ' found' : ''}`;
    }
  };

  for (const subnet of subnets) {
    if (signal.aborted) break;
    const ips = Array.from({length:254}, (_,i) => `${subnet}.${i+1}`);
    for (let i = 0; i < ips.length; i += 30) {
      if (signal.aborted) break;
      await Promise.all(ips.slice(i, i+30).map(probe));
    }
  }

  if (!signal.aborted) {
    const note = found.length
      ? `Done — ${found.length} device${found.length>1?'s':''} found`
      : 'No ESP32 found. Try manual IP below.';
    document.getElementById('scan-note').textContent = note;
    if (!connected) setBadge('', 'Not connected');
    log(note, found.length ? 'ok' : 'err');
    if (!found.length && !list.children.length) {
      list.innerHTML = '<div style="font-size:0.82rem;color:var(--muted)">No devices found. Check Serial Monitor (115200) for the ESP32 IP.</div>';
    }
  }
}

async function connectTo(ip, itemEl) {
  document.querySelectorAll('.device-item').forEach(e => e.classList.remove('selected'));
  if (itemEl) itemEl.classList.add('selected');
  espURL = ip.startsWith('http') ? ip.replace(/\/$/, '') : 'http://' + ip;
  setBadge('scanning', 'Connecting…');
  try {
    const r = await fetchWithTimeout(espURL + '/status', 4000);
    const j = await r.json();
    connected = true;
    setBadge('ok', `${deviceLabel(j)} · printer ${j.printer}`);
    log(`Connected to ${deviceLabel(j)} at ${j.ip || ip}`, 'ok');
    document.getElementById('upload-section').style.display = 'block';
    startPolling();
    if (j.printer === 'disconnected') log('Printer BLE not connected yet — check it is on', 'info');
    localStorage.setItem('esp32ip', j.ip || ip);
  } catch(e) {
    connected = false;
    setBadge('err', 'Connection failed');
    log('Connect failed: ' + e.message, 'err');
  }
}

async function connectManual() {
  const val = document.getElementById('manual-ip').value.trim();
  if (!val) return;
  await connectTo(val, null);
}

function startPolling() {
  if (pollTimer) clearInterval(pollTimer);
  pollTimer = setInterval(async () => {
    try {
      const r = await fetchWithTimeout(espURL+'/status', 3000);
      const j = await r.json();
      setBadge('ok', `${deviceLabel(j)} · printer ${j.printer}`);
    } catch { setBadge('err', 'ESP32 unreachable'); }
  }, 6000);
}

const fileInput = document.getElementById('file-input');
const dropzone = document.getElementById('dropzone');

fileInput.addEventListener('change', e => e.target.files[0] && handleFile(e.target.files[0]));
dropzone.addEventListener('dragover', e => { e.preventDefault(); dropzone.classList.add('over'); });
dropzone.addEventListener('dragleave', () => dropzone.classList.remove('over'));
dropzone.addEventListener('drop', e => {
  e.preventDefault(); dropzone.classList.remove('over');
  if (e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]);
});

async function handleFile(file) {
  log('Loading ' + file.name);
  pages = [];
  document.getElementById('page-grid').innerHTML = '';
  document.getElementById('print-section').style.display = 'block';
  const buf = await file.arrayBuffer();
  if (file.type === 'application/pdf' || file.name.endsWith('.pdf')) await loadPDF(buf);
  else await loadImage(buf, file.type);
  updatePrintBtn();
}

async function loadPDF(buf) {
  const pdf = await pdfjsLib.getDocument({data: buf}).promise;
  log(`PDF: ${pdf.numPages} page(s)`);
  for (let i = 1; i <= pdf.numPages; i++) {
    const pg = await pdf.getPage(i);
    const vp = pg.getViewport({scale: 384 / pg.getViewport({scale:1}).width});
    const cv = document.createElement('canvas');
    cv.width = 384; cv.height = Math.round(vp.height);
    await pg.render({canvasContext: cv.getContext('2d'), viewport: vp}).promise;
    addPageThumb(cv, i);
  }
}

async function loadImage(buf, mime) {
  const url = URL.createObjectURL(new Blob([buf],{type:mime}));
  const img = new Image();
  await new Promise(res => { img.onload = res; img.src = url; });
  const cv = document.createElement('canvas');
  cv.width = 384; cv.height = Math.round(img.height * 384 / img.width);
  cv.getContext('2d').drawImage(img, 0, 0, cv.width, cv.height);
  URL.revokeObjectURL(url);
  addPageThumb(cv, 1);
  log('Image loaded');
}

function addPageThumb(canvas, num) {
  const t = document.createElement('div');
  t.className = 'page-thumb sel';
  const c = canvas.cloneNode(true);
  t.appendChild(c);
  t.innerHTML += `<span class="pnum">p${num}</span>`;
  t.addEventListener('click', () => { t.classList.toggle('sel'); updatePrintBtn(); });
  document.getElementById('page-grid').appendChild(t);
  pages.push({ canvas });
}

function updatePrintBtn() {
  const any = [...document.getElementById('page-grid').children].some(e => e.classList.contains('sel'));
  document.getElementById('print-btn').disabled = !any || !connected;
}

document.getElementById('darkness').addEventListener('input', e => {
  document.getElementById('darkness-val').textContent = e.target.value;
});

function to1bpp(canvas) {
  const ctx = canvas.getContext('2d');
  const id = ctx.getImageData(0, 0, canvas.width, canvas.height);
  const d = id.data, w = canvas.width, h = canvas.height;
  const g = new Float32Array(w * h);
  for (let i = 0; i < w*h; i++) g[i] = d[i*4]*0.299 + d[i*4+1]*0.587 + d[i*4+2]*0.114;
  const out = new Uint8Array(Math.ceil(w/8) * h);
  for (let y = 0; y < h; y++) {
    for (let x = 0; x < w; x++) {
      const idx = y*w+x;
      const old = g[idx];
      const nv = old < 128 ? 0 : 255;
      const err = old - nv;
      g[idx] = nv;
      if (x+1 < w) g[idx+1] += err*7/16;
      if (y+1 < h) {
        if (x>0) g[idx+w-1] += err*3/16;
        g[idx+w] += err*5/16;
        if (x+1 < w) g[idx+w+1] += err*1/16;
      }
      const bi = y*(w/8) + Math.floor(x/8);
      if (nv === 0) out[bi] |= (1 << (7 - x%8));
    }
  }
  return { bytes: out, lines: h };
}

async function printSelected() {
  if (!connected) return;
  const btn = document.getElementById('print-btn');
  btn.disabled = true;
  btn.textContent = 'Printing…';
  const darkness = parseInt(document.getElementById('darkness').value);
  const grid = document.getElementById('page-grid');
  const sel = pages.filter((_,i) => grid.children[i]?.classList.contains('sel'));
  log(`Sending ${sel.length} page(s), darkness ${darkness}`, 'info');

  for (let i = 0; i < sel.length; i++) {
    log(`Converting page ${i+1}…`);
    const { bytes, lines } = to1bpp(sel[i].canvas);
    try {
      log(`Sending page ${i+1} — ${lines} lines, ${bytes.length} bytes`);
      const postCtrl = new AbortController();
      const postTimer = setTimeout(() => postCtrl.abort(), 60000);
      const r = await fetch(espURL + '/print', {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ lines, darkness, data: Array.from(bytes) }),
        signal: postCtrl.signal,
        mode: 'cors'
      });
      clearTimeout(postTimer);
      const j = await r.json();
      j.status === 'printed'
        ? log(`Page ${i+1} printed ✓`, 'ok')
        : log(`Page ${i+1} error: ${j.error}`, 'err');
    } catch(e) {
      log(`Page ${i+1} failed: ${e.message}`, 'err');
    }
    if (i < sel.length-1) await new Promise(r => setTimeout(r, 1500));
  }

  btn.textContent = 'Print selected pages';
  updatePrintBtn();
}

const saved = localStorage.getItem('esp32ip');
if (saved) {
  document.getElementById('manual-ip').value = saved;
  log('Last IP: ' + saved + ' — press Scan or enter manually', 'info');
}
