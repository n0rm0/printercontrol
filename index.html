<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Cat Printer Protocol Diagnostic Tool</title>
    <style>
        body { font-family: sans-serif; max-width: 500px; margin: 40px auto; padding: 20px; text-align: center; background: #f5f6fa; }
        button { width: 100%; padding: 14px; margin: 8px 0; font-size: 15px; font-weight: bold; border: none; border-radius: 6px; cursor: pointer; color: white; }
        #connectBtn { background: #2f3640; }
        .test-btn { background: #00a8ff; }
        .test-btn:disabled { background: #cbcbcb; cursor: not-allowed; }
        #log { margin-top: 20px; text-align: left; background: #222; color: #00ff00; padding: 15px; font-family: monospace; border-radius: 4px; max-height: 200px; overflow-y: auto; }
    </style>
</head>
<body>

    <h2>🐱 Cat Printer Protocol Scanner</h2>
    <p>Connect your printer, then click through the tests sequentially until the paper feeds.</p>

    <button id="connectBtn">1. Search & Connect Printer</button>
    <button class="test-btn" id="btnV1" disabled>Test Variant 1 (0x02 wrapped payload)</button>
    <button class="test-btn" id="btnV2" disabled>Test Variant 2 (Raw ESC/POS sequence)</button>
    <button class="test-btn" id="btnV3" disabled>Test Variant 3 (0x51 0x78 Legacy wrapper)</button>
    <button class="test-btn" id="btnV4" disabled>Test Variant 4 (Simplified 0xA1 parameter)</button>

    <div id="log">System: Ready. Awaiting connection...</div>

    <script>
        // Global UUID parameters for Shenzhen Yiduoshudianzikeji modules
        const SERVICE_UUID = '0000ae30-0000-1000-8000-00805f9b34fb';
        const CHAR_UUID    = '0000ae01-0000-1000-8000-00805f9b34fb';

        let charWrite = null;
        const logDiv = document.getElementById('log');

        function printLog(msg) {
            logDiv.innerHTML += "<br>> " + msg;
            logDiv.scrollTop = logDiv.scrollHeight;
        }

        // Connect Handshake
        document.getElementById('connectBtn').addEventListener('click', async () => {
            printLog("Opening Bluetooth device filter window...");
            try {
                const device = await navigator.bluetooth.requestDevice({
                    acceptAllDevices: true,
                    optionalServices: [SERVICE_UUID]
                });
                
                printLog(`Device selected: ${device.name}. Handshaking...`);
                const server = await device.gatt.connect();
                const service = await server.getPrimaryService(SERVICE_UUID);
                charWrite = await service.getCharacteristic(CHAR_UUID);
                
                printLog("Connection established! Tests unlocked.");
                document.querySelectorAll('.test-btn').forEach(b => b.disabled = false);
            } catch (err) {
                printLog(`ERROR: ${err.message}`);
            }
        });

        async function sendBytes(byteArray) {
            if (!charWrite) return;
            try {
                await charWrite.writeValueWithoutResponse(new Uint8Array(byteArray));
            } catch(e) {
                printLog(`Write fail: ${e.message}`);
            }
        }

        // VARIANT 1: Corrected Checksum Wrapped Framework [0x02, CMD, LEN, PAYLOAD, CRC, 0x03]
        document.getElementById('btnV1').addEventListener('click', async () => {
            printLog("Sending Variant 1 (0x02 wrapper verification)...");
            // Corrected array manipulation tracking (Payload: 0x32, 0x00 -> CRC = 0x5C)
            const packet = [0x02, 0xA1, 0x02, 0x32, 0x00, 0x5C, 0x03];
            await sendBytes(packet);
        });

        // VARIANT 2: Direct Low-level ESC/POS Motor drive bypass
        document.getElementById('btnV2').addEventListener('click', async () => {
            printLog("Sending Variant 2 (Raw ESC/POS stream)...");
            const packet = [0x1B, 0x4A, 0x40]; // ESC J 64: Advance feeding steps
            await sendBytes(packet);
        });

        // VARIANT 3: The 0x51 0x78 Chinese Clone Hardware framing protocol
        document.getElementById('btnV3').addEventListener('click', async () => {
            printLog("Sending Variant 3 (0x51 0x78 protocol)...");
            const packet = [0x51, 0x78, 0xA1, 0x00, 0x01, 0x00, 0x20, 0xFF]; 
            await sendBytes(packet);
        });

        // VARIANT 4: Naked Header Parameter Drive
        document.getElementById('btnV4').addEventListener('click', async () => {
            printLog("Sending Variant 4 (Simplified Command array)...");
            const packet = [0xA1, 0x00, 0x00, 0x00, 0x40]; 
            await sendBytes(packet);
        });
    </script>
</body>
</html>
