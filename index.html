<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MXW01 Dynamic Channel Controller</title>
    <style>
        body { font-family: system-ui, sans-serif; max-width: 480px; margin: 30px auto; padding: 20px; text-align: center; background-color: #f5f6fa; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 20px; }
        textarea { width: 100%; box-sizing: border-box; height: 80px; padding: 10px; border: 1px solid #dcdde1; border-radius: 8px; font-size: 16px; resize: vertical; margin-bottom: 10px; }
        button { border: none; padding: 14px 28px; font-size: 16px; font-weight: bold; border-radius: 25px; cursor: pointer; width: 100%; margin: 6px 0; }
        #connectBtn { background-color: #2f3640; color: white; }
        #printBtn { background-color: #20bf6b; color: white; }
        button:disabled { background-color: #dcdde1 !important; color: #a5b1c2; cursor: not-allowed; }
        #status { font-size: 13px; color: #2f3640; background: #ffffff; padding: 12px; border-radius: 8px; border: 1px solid #dcdde1; text-align: left; font-family: monospace; white-space: pre-wrap; max-height: 220px; overflow-y: auto; }
    </style>
</head>
<body>

    <h2>🐱 MXW01 Channel Mapping Controller</h2>
    
    <div class="card">
        <button id="connectBtn" style="width:100%;">1. Connect & Map Channels</button>
    </div>

    <div class="card">
        <textarea id="textInput" placeholder="Type text to print here..."></textarea>
        <button id="printBtn" style="width:100%;" disabled>2. Print Text Message</button>
    </div>

    <div id="status">Status: Awaiting Bluetooth Pairing...</div>
    <canvas id="renderCanvas" width="384" height="100" style="display:none;"></canvas>

    <script>
        // List of alternate GATT addresses used across Shenzhen hardware variations
        const SERVICE_UUIDS = [
            '0000ae30-0000-1000-8000-00805f9b34fb',
            '0000ae01-0000-1000-8000-00805f9b34fb',
            '0000ff00-0000-1000-8000-00805f9b34fb',
            '000018f0-0000-1000-8000-00805f9b34fb'
        ];

        let activeCharacteristic = null;
        const statusDiv = document.getElementById('status');
        const connectBtn = document.getElementById('connectBtn');
        const printBtn = document.getElementById('printBtn');
        const textInput = document.getElementById('textInput');
        const canvas = document.getElementById('renderCanvas');
        const ctx = canvas.getContext('2d');

        function log(msg) {
            statusDiv.innerText += "\n> " + msg;
            statusDiv.scrollTop = statusDiv.scrollHeight;
            console.log(msg);
        }

        function makeMXWPacket(cmdId, payloadArray) {
            const len = payloadArray.length;
            const buffer = new Uint8Array(6 + len);
            buffer[0] = 0x51; 
            buffer[1] = cmdId; 
            buffer[2] = 0x00; 
            buffer[3] = 0x00; 
            buffer[4] = len & 0xFF; 
            buffer[5] = (len >> 8) & 0xFF; 
            if (len > 0) buffer.set(new Uint8Array(payloadArray), 6);
            return buffer;
        }

        connectBtn.addEventListener('click', async () => {
            log("Querying nearby Bluetooth broadcasts...");
            try {
                const device = await navigator.bluetooth.requestDevice({
                    filters: [{ namePrefix: 'MXW' }, { namePrefix: 'GB' }, { name: 'MXW01' }],
                    optionalServices: SERVICE_UUIDS
                });
                
                log(`Connecting to: ${device.name}...`);
                const server = await device.gatt.connect();
                
                log("Scanning for open service tunnels...");
                let characteristicFound = false;

                // Loop through known service registers to match the correct one
                for (const serviceUuid of SERVICE_UUIDS) {
                    try {
                        const service = await server.getPrimaryService(serviceUuid);
                        const characteristics = await service.getCharacteristics();
                        
                        for (const char of characteristics) {
                            // Look for a pipeline that accepts direct writes without requiring responses
                            if (char.properties.writeWithoutResponse || char.properties.write) {
                                activeCharacteristic = char;
                                log(`Matched working endpoint! Service: ${serviceUuid.substring(4,8)}, Char: ${char.uuid.substring(4,8)}`);
                                characteristicFound = true;
                                break;
                            }
                        }
                    } catch (e) {
                        // Skip unmapped slots quietly
                    }
                    if (characteristicFound) break;
                }

                if (!activeCharacteristic) {
                    throw new Error("No open write channels found on this printer module.");
                }

                log("Printer communication channel configured!");
                connectBtn.disabled = true;
                printBtn.disabled = false;
            } catch (err) {
                log(`Handshake Rejected: ${err.message}`);
            }
        });

        printBtn.addEventListener('click', async () => {
            if (!activeCharacteristic) return;
            const text = textInput.value.trim();
            if (!text) { alert("Please type text first."); return; }

            printBtn.disabled = true;
            log("Converting font to matrix grid...");

            ctx.font = "bold 24px Arial, sans-serif";
            ctx.textBaseline = "top";
            
            const lines = text.split('\n');
            const lineHeight = 32;
            let targetHeight = lines.length * lineHeight + 20;
            
            while (targetHeight % 4 !== 0) targetHeight++;
            
            canvas.height = targetHeight;
            ctx.fillStyle = "#FFFFFF";
            ctx.fillRect(0, 0, 384, canvas.height);
            ctx.fillStyle = "#000000";
            ctx.font = "bold 24px Arial, sans-serif";
            ctx.textBaseline = "top";
            
            lines.forEach((line, index) => {
                ctx.fillText(line, 8, index * lineHeight + 10);
            });

            const imgData = ctx.getImageData(0, 0, 384, canvas.height);
            const pixels = imgData.data;
            const totalRows = canvas.height;

            try {
                log(`Streaming ${totalRows} lines to matched pipe...`);
                
                // Initialize printing session sequence registers
                await activeCharacteristic.writeValueWithoutResponse(makeMXWPacket(0xAF, [0x5D, 0x00])); 
                await new Promise(r => setTimeout(r, 60));
                await activeCharacteristic.writeValueWithoutResponse(makeMXWPacket(0xA2, [0x01, 0x00, 0x00, 0x00])); 
                await new Promise(r => setTimeout(r, 60));
                
                for (let y = 0; y < totalRows; y++) {
                    const rowBytes = new Uint8Array(48);
                    for (let x = 0; x < 384; x++) {
                        const pixelIndex = (y * 384 + x) * 4;
                        if (pixels[pixelIndex] < 128) { 
                            const byteIdx = Math.floor(x / 8);
                            const bitIdx = 7 - (x % 8);
                            rowBytes[byteIdx] |= (1 << bitIdx);
                        }
                    }
                    
                    await activeCharacteristic.writeValueWithoutResponse(makeMXWPacket(0xA0, Array.from(rowBytes)));
                    await new Promise(r => setTimeout(r, 45)); 
                }

                // Append terminal margin spacer rows
                const blankLine = new Array(48).fill(0x00);
                for (let i = 0; i < 30; i++) {
                    await activeCharacteristic.writeValueWithoutResponse(makeMXWPacket(0xA0, blankLine));
                    await new Promise(r => setTimeout(r, 30));
                }

                await activeCharacteristic.writeValueWithoutResponse(makeMXWPacket(0xA3, [0x01, 0x00, 0x00, 0x00]));
                log("Data stream completed!");

            } catch (err) {
                log(`Data transfer dropped: ${err.message}`);
            } finally {
                printBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
